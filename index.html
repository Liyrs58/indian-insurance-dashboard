<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRDAI · Indian Insurance Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/tabulator-tables@5.4.3/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://unpkg.com/tabulator-tables@5.4.3/dist/js/tabulator.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<link rel="stylesheet" href="css/bloomberg.css">
</head>
<body>
<div class="terminal">

  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="logo">IRDAI<span>.</span></div>
    <div class="nav-tabs" id="navTabs">
      <div class="nav-tab active" data-view="overview"><span class="fkey">F1</span>OVERVIEW</div>
      <div class="nav-tab" data-view="life"><span class="fkey">F2</span>LIFE</div>
      <div class="nav-tab" data-view="nonlife"><span class="fkey">F3</span>NON-LIFE</div>
      <div class="nav-tab" data-view="compare"><span class="fkey">F4</span>COMPARE</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-status"><div class="status-dot"></div><span id="dataStatus">LIVE</span></div>
      <div class="user-badge">IRDAI</div>
      <div class="topbar-time" id="clock">--:--:-- IST</div>
    </div>
  </div>

  <!-- ═══ TICKER TAPE ═══ -->
  <div class="ticker-tape">
    <div class="ticker-label">TICKER</div>
    <div class="ticker-scroll" id="ticker"></div>
  </div>

  <!-- ═══ KPI STRIP ═══ -->
  <div class="kpi-strip" id="kpiStrip"></div>

  <!-- ═══ MAIN GRID ═══ -->
  <div class="main-grid">

    <!-- ─── LEFT: TABLE ─── -->
    <div class="panel panel-left">
      <div class="panel-header">
        <div class="panel-title" id="tableTitle">ALL INSURERS</div>
        <div class="panel-cmd" id="tableMonth">--</div>
      </div>
      <div class="panel-tabs">
        <div class="panel-tab active" data-tab="table">TABLE</div>
        <div class="panel-tab" data-tab="hhi">CONCENTRATION</div>
        <div class="panel-tab" data-tab="movers">MOVERS</div>
      </div>
      <div class="tab-content active" id="table-tab">
        <div class="panel-body" id="tableContainer"></div>
      </div>
      <div class="tab-content" id="hhi-tab">
        <div class="panel-body" id="hhiContainer" style="padding:8px;"></div>
      </div>
      <div class="tab-content" id="movers-tab">
        <div class="panel-body" id="moversContainer" style="padding:8px;"></div>
      </div>
    </div>

    <!-- ─── RIGHT TOP: TREND CHART ─── -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title" id="chartTitle">PREMIUM TREND</div>
        <div class="panel-cmd" id="chartSub">Lifetime</div>
      </div>
      <div class="chart-panel-body">
        <div class="chart-ticker-row">
          <div class="chart-ticker" id="chTicker">IRDAI</div>
          <div class="chart-price" id="chPrice">--</div>
          <div class="chart-change" id="chChange">--</div>
        </div>
        <div class="chart-meta" id="chartMeta"></div>
        <div class="chart-controls">
          <button class="tf-btn active" data-tf="all">ALL</button>
          <button class="tf-btn" data-tf="life">LIFE</button>
          <button class="tf-btn" data-tf="nonlife">NON-LIFE</button>
          <div style="flex:1"></div>
          <button class="tf-btn" data-indicator="ema" style="color:var(--amber);border-color:var(--amber-dim)">EMA</button>
          <button class="tf-btn" onclick="fitChart()" style="color:var(--cyan);border-color:rgba(0,204,255,0.3)">FIT</button>
        </div>
        <div class="chart-area" id="trendChart"></div>
      </div>
    </div>

    <!-- ─── RIGHT BOTTOM: INSIGHTS ─── -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">MARKET INSIGHTS</div>
        <div class="panel-cmd">IRDAI</div>
      </div>
      <div class="panel-tabs">
        <div class="panel-tab active" data-panel="insights">INSIGHTS</div>
        <div class="panel-tab" data-panel="players">TOP PLAYERS</div>
        <div class="panel-tab" data-panel="penetration">PENETRATION</div>
      </div>
      <div class="panel-body tab-content active" id="insights-tab" style="padding:8px;"></div>
      <div class="panel-body tab-content" id="players-tab" style="padding:8px;"></div>
      <div class="panel-body tab-content" id="penetration-tab" style="padding:8px;"></div>
    </div>

  </div>

  <!-- ═══ COMMAND BAR ═══ -->
  <div class="command-bar">
    <span class="cmd-prompt">IRDAI&gt;</span>
    <input class="cmd-input" id="cmdInput" placeholder="Type help for commands..." spellcheck="false">
    <span class="cmd-status" id="cmdStatus">60 insurers tracked</span>
  </div>

</div>

<!-- ═══ HIDDEN POPUP ═══ -->
<div class="popup-overlay" id="popup">
  <div class="popup-content">
    <div class="popup-header">
      <span id="popupTitle">DETAIL</span>
      <span class="popup-close" onclick="closePopup()">✕</span>
    </div>
    <div class="popup-body" id="popupBody"></div>
  </div>
</div>

<script>document.body.classList.add('loading');</script>
<script src="js/dashboard.js"></script>
</body>
</html>
